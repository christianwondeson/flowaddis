name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      # If deploy fails with cloudbilling.googleapis.com 403, enable Cloud Billing API on the GCP project:
      # https://console.developers.google.com/apis/api/cloudbilling.googleapis.com/overview?project=1021348571684
      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FLOWADDIS_EA8E1 }}
          projectId: flowaddis-ea8e1
          channelId: live
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
          NEXT_PUBLIC_RAPIDAPI_KEY: ${{ secrets.NEXT_PUBLIC_RAPIDAPI_KEY }}
          # Server-only RapidAPI key for Web Frameworks build + SSR (preferred over NEXT_PUBLIC_*).
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          # Server-side Route Handlers call Nest; set repo secret to https://api.bookaddis.com (non-empty).
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
